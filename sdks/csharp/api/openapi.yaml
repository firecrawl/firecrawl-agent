openapi: 3.1.0
info:
  description: |
    AI-powered web research agent built on Firecrawl.
    Search, scrape, and extract structured data from the web.
  license:
    name: MIT
  title: Firecrawl Agent API
  version: 0.1.0
servers:
- description: Local development
  url: http://localhost:3000/api/v1
- description: Production
  url: https://your-deployment.vercel.app/api/v1
paths:
  /run:
    post:
      description: |
        Execute a web research task. Supports both streaming (SSE) and
        non-streaming responses. This is the single consolidated endpoint
        that replaces /query, /extract, and /plan.
      operationId: run
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
            text/event-stream:
              schema:
                description: SSE stream of AgentEvent objects (when stream=true)
                type: string
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Server error
      summary: Run the agent
  /skills:
    get:
      description: Returns all discovered skills the agent can use.
      operationId: listSkills
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Skill"
                type: array
          description: List of skills
      summary: List available skills
  /workers/progress:
    get:
      description: Poll for progress of currently running parallel workers.
      operationId: getWorkerProgress
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: "#/components/schemas/WorkerProgress"
          description: Worker progress map
      summary: Get parallel worker progress
components:
  schemas:
    RunRequest:
      example:
        schema: "{}"
        skills:
        - skills
        - skills
        urls:
        - urls
        - urls
        stream: false
        columns:
        - columns
        - columns
        format: json
        model:
          provider: anthropic
          model: model
        subAgentModel:
          provider: anthropic
          model: model
        maxSteps: 4
        prompt: "Get pricing for Vercel, Netlify, and Cloudflare Pages"
      properties:
        prompt:
          description: The research task or question.
          example: "Get pricing for Vercel, Netlify, and Cloudflare Pages"
          type: string
        stream:
          default: false
          description: "If true, response is an SSE stream of AgentEvent objects."
          type: boolean
        format:
          description: "Desired output format. If set, agent will format data accordingly."
          enum:
          - json
          - csv
          - markdown
          type: string
        schema:
          description: JSON Schema for structured output (used with format=json).
          type: object
        columns:
          description: Column names for CSV output.
          items:
            type: string
          type: array
        urls:
          description: Seed URLs to start from instead of searching.
          items:
            type: string
          type: array
        model:
          $ref: "#/components/schemas/ModelConfig"
        subAgentModel:
          $ref: "#/components/schemas/ModelConfig"
        maxSteps:
          default: 15
          description: Maximum agent steps before stopping.
          maximum: 50
          minimum: 1
          type: integer
        skills:
          description: Skills to pre-load for this run.
          items:
            type: string
          type: array
      required:
      - prompt
    RunResponse:
      example:
        data: data
        usage:
          inputTokens: 0
          outputTokens: 6
          totalTokens: 1
        format: json
        text: text
        steps:
        - toolResults:
          - output: "{}"
            name: name
          - output: "{}"
            name: name
          text: text
          toolCalls:
          - input: "{}"
            name: name
          - input: "{}"
            name: name
        - toolResults:
          - output: "{}"
            name: name
          - output: "{}"
            name: name
          text: text
          toolCalls:
          - input: "{}"
            name: name
          - input: "{}"
            name: name
      properties:
        text:
          description: The agent's final text response.
          type: string
        data:
          description: Formatted output (present when format was specified).
          type: string
        format:
          description: The format of the data field.
          enum:
          - json
          - csv
          - markdown
          - text
          type: string
        steps:
          items:
            $ref: "#/components/schemas/StepDetail"
          type: array
        usage:
          $ref: "#/components/schemas/Usage"
    ModelConfig:
      example:
        provider: anthropic
        model: model
      properties:
        provider:
          description: LLM provider.
          enum:
          - anthropic
          - openai
          - google
          - gateway
          type: string
        model:
          description: "Model identifier (e.g. \"gemini-3-flash-preview\", \"claude-sonnet-4-6\"\
            )."
          type: string
    StepDetail:
      example:
        toolResults:
        - output: "{}"
          name: name
        - output: "{}"
          name: name
        text: text
        toolCalls:
        - input: "{}"
          name: name
        - input: "{}"
          name: name
      properties:
        text:
          type: string
        toolCalls:
          items:
            $ref: "#/components/schemas/StepDetail_toolCalls_inner"
          type: array
        toolResults:
          items:
            $ref: "#/components/schemas/StepDetail_toolResults_inner"
          type: array
    Usage:
      example:
        inputTokens: 0
        outputTokens: 6
        totalTokens: 1
      properties:
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        totalTokens:
          type: integer
    Skill:
      example:
        name: name
        description: description
        resources:
        - resources
        - resources
        category: category
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        resources:
          items:
            type: string
          type: array
    WorkerProgress:
      properties:
        id:
          type: string
        status:
          enum:
          - running
          - done
          - error
          type: string
        steps:
          type: integer
        currentTool:
          type: string
        tokens:
          type: integer
        stepLog:
          items:
            $ref: "#/components/schemas/WorkerProgress_stepLog_inner"
          type: array
    AgentEvent:
      description: Server-sent event payload (when stream=true)
      oneOf:
      - $ref: "#/components/schemas/AgentEvent_oneOf"
      - $ref: "#/components/schemas/AgentEvent_oneOf_1"
      - $ref: "#/components/schemas/AgentEvent_oneOf_2"
      - $ref: "#/components/schemas/AgentEvent_oneOf_3"
      - $ref: "#/components/schemas/AgentEvent_oneOf_4"
      - $ref: "#/components/schemas/AgentEvent_oneOf_5"
    ErrorResponse:
      example:
        error: error
      properties:
        error:
          type: string
    StepDetail_toolCalls_inner:
      example:
        input: "{}"
        name: name
      properties:
        name:
          type: string
        input:
          type: object
    StepDetail_toolResults_inner:
      example:
        output: "{}"
        name: name
      properties:
        name:
          type: string
        output:
          type: object
    WorkerProgress_stepLog_inner:
      properties:
        tool:
          type: string
        detail:
          type: string
    AgentEvent_oneOf:
      properties:
        type: {}
        content:
          type: string
    AgentEvent_oneOf_1:
      properties:
        type: {}
        name:
          type: string
        input:
          type: object
    AgentEvent_oneOf_2:
      properties:
        type: {}
        name:
          type: string
        output:
          type: object
    AgentEvent_oneOf_3:
      properties:
        type: {}
        usage:
          $ref: "#/components/schemas/Usage"
    AgentEvent_oneOf_4:
      properties:
        type: {}
        text:
          type: string
        steps:
          items:
            $ref: "#/components/schemas/StepDetail"
          type: array
        usage:
          $ref: "#/components/schemas/Usage"
    AgentEvent_oneOf_5:
      properties:
        type: {}
        error:
          type: string

